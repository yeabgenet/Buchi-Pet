$kind: http-example
request:
  url: "{{base_url}}/generate_report"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "from_date": "2022-02-01",
        "to_date": "2022-03-01"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: text
    content: |-
      {
        "status": "success",
        "data": {
          "adopted_pet_types": {
            "Cat": 12,
            "Dog": 34
          },
          "weekly_adoption_requests": {
            "2022-02-01": 10,
            "2022-02-08": 13,
            "2022-02-15": 9
          }
        }
      }
order: 1000
