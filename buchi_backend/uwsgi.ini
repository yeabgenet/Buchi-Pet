[uwsgi]
; uWSGI configuration for Buchi Pet Adoption API
; Production-ready configuration for WSGI/ASGI applications

; Application module
module = app.main:app

; Master process
master = true

; Number of worker processes
; Formula: (2 × CPU cores) + 1
processes = 4

; Threads per worker
threads = 2

; Socket configuration (for nginx reverse proxy)
; Use http-socket for direct HTTP or socket for Unix domain socket
http-socket = :8000

; Alternative: Unix socket for nginx
; socket = /tmp/buchi-api.sock
; chmod-socket = 666

; Worker class for ASGI/FastAPI
; For ASGI apps, we need the asyncio plugin
async = 100
greenlet = true

; HTTP Keep-Alive	http-keepalive = true
add-header = Connection: Keep-Alive

; Buffer size
buffer-size = 32768

; Request timeout
harakiri = 120
harakiri-verbose = true

; Memory optimization
max-requests = 1000
max-requests-delta = 100

; PID file
pidfile = /tmp/buchi-api.pid

; Logging
logto = /var/log/buchi-api/uwsgi.log
log-maxsize = 50000000
log-backupname = /var/log/buchi-api/uwsgi.log.old

; Vacuum on exit
vacuum = true

; Die on term
die-on-term = true

; Single interpreter mode
single-interpreter = true

; Memory limit
memory-report = true

; Stats socket for monitoring
stats = /tmp/buchi-stats.sock
stats-http = true

; Reload workers gracefully
reload-mercy = 10
worker-reload-mercy = 10

; Catch exceptions
catch-exceptions = true

; Enable threads
enable-threads = true

; Thunder lock
thunder-lock = true
